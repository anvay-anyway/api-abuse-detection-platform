<!DOCTYPE html>
<html>
<head>
    <title>API Abuse Detection Dashboard</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }
        input, button {
            padding: 10px;
            margin: 5px;
        }
        .log {
            margin-top: 20px;
        }
        .allowed { color: green; }
        .throttled { color: orange; }
        .blocked { color: red; }
    </style>
</head>

<body>

<h2>🚀 API Abuse Detection Dashboard</h2>

<input id="apiKey" placeholder="Enter API Key" />
<input id="url" placeholder="Enter Target URL" value="https://jsonplaceholder.typicode.com/posts/1"/>
<br>
<button onclick="sendRequest()">Send Request</button>
<button onclick="burst()">Burst x5</button>

<div class="log" id="log"></div>

<script>

const API_ENDPOINT = "https://1dqsn8rk74.execute-api.ap-southeast-2.amazonaws.com/prod/checkRequest";

function logMessage(msg, type) {
    const div = document.getElementById("log");
    const p = document.createElement("p");
    p.className = type;
    p.innerText = msg;
    div.prepend(p);
}

async function sendRequest() {
    const apiKey = document.getElementById("apiKey").value;
    const url = document.getElementById("url").value;

    const res = await fetch(API_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            api_key: apiKey,
            target_url: url
        })
    });

    const data = await res.json();

    logMessage(JSON.stringify(data), data.decision?.toLowerCase() || "allowed");
}

function burst() {
    for (let i = 0; i < 5; i++) {
        setTimeout(sendRequest, i * 300);
    }
}

</script>

</body>
</html>
